name: Collect Tomorrow (DA HH)
description: Collects EPEX Spot GB Day-Ahead Auction half-hourly prices for tomorrow and uploads the results as an artifact and to Azure Blob Storage.

on:
  # Allows manual trigger
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to scrape (yyyy-MM-dd). Defaults to tomorrow if not provided.'
        required: false
        type: string
  schedule:
    # Runs at 15:50 every day (London time)
    - cron: '48 15 * * *'
      time-zone: 'Europe/London'

jobs:
  scrape:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create virtual environment
        run: py -3.12 -m venv .env

      - name: Activate venv and install dependencies
        run: |
          .\.env\Scripts\activate
          py -m pip install -r requirements.txt
          py -m playwright install chromium

      - name: Run scrape script with tomorrow's date
        run: |
          .\.env\Scripts\activate
          $inputDate = "${{ github.event.inputs.date }}"
          if ($inputDate -ne "") { $date = $inputDate } else { $date = $(Get-Date (Get-Date).AddDays(1) -Format 'yyyy-MM-dd') }
          py scrape_epex_da_hh.py --date "$date" --template template-da-hh.xlsx --out "EpexSpotDA-HH-${date}.xlsx"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPEX-Spot-DA-HH-Results
          path: EpexSpotDA-HH-*.xlsx
          retention-days: 2
          if-no-files-found: error

      - uses: fixpoint/azblob-upload-artifact@v4
        with:
          connection-string: ${{ secrets.AZURE_CONNECTION_STRING }}
          name: epex-spot-da-hh-results
          path: EpexSpotDA-HH-*.xlsx

      - name: Teams alert
        uses: jdcargile/ms-teams-notification@v1.4
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK }}
          notification-summary: EPEX Spot GB DA HH Market Results Collected
          notification-color: 28a745
          timezone: Europe/London
          verbose-logging: true